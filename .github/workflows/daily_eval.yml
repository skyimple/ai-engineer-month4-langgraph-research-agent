name: Daily Research Agent Evaluation

on:
  schedule:
    - cron: '0 8 * * *'  # Run at 8:00 AM UTC daily
  workflow_dispatch:  # Allow manual trigger
    inputs:
      topic_limit:
        description: 'Number of topics to evaluate (default: 5)'
        required: false
        default: '5'

jobs:
  evaluate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --quiet -r requirements.txt

      - name: Create config.env
        run: |
          if [ -z "${{ secrets.DASHSCOPE_API_KEY }}" ]; then
            echo "::error::DASHSCOPE_API_KEY secret is not configured"
            exit 1
          fi
          echo "DASHSCOPE_API_KEY=${{ secrets.DASHSCOPE_API_KEY }}" > config.env
          echo "LANGCHAIN_API_KEY=${{ secrets.LANGCHAIN_API_KEY }}" >> config.env
          echo "LANGCHAIN_TRACING_V2=true" >> config.env
          echo "LANGSMITH_PROJECT=research-agent-eval" >> config.env

      - name: Run evaluation
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          python -u evals/runners/daily_eval.py --limit ${{ github.event.inputs.topic_limit || '5' }} 2>&1 || (echo "::error::Evaluation failed with exit code $?" && exit 1)

      - name: Upload evaluation report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: evaluation-report
          path: evals/reports/daily_eval_*.json
          retention-days: 30

      - name: Comment on latest report
        if: always()
        run: |
          echo "## Daily Evaluation Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          latest_report=$(ls -t evals/reports/daily_eval_*.json 2>/dev/null | head -1)
          if [ -f "$latest_report" ]; then
            echo "### Summary" >> $GITHUB_STEP_SUMMARY
            REPORT_PATH="$latest_report" python -c "
import json, os
report = json.loads(open(os.environ['REPORT_PATH']).read())
print(f'- Topics: {report[\"topic_count\"]}')
print(f'- Success Rate: {report[\"success_count\"]}/{report[\"topic_count\"]}')
print(f'- Overall Score: {report[\"overall_score\"]:.4f}')
print('')
print('### Metrics')
print(f'- Faithfulness: {report[\"metrics\"][\"faithfulness\"][\"average\"]:.4f}')
print(f'- Relevance: {report[\"metrics\"][\"relevance\"][\"average\"]:.4f}')
print(f'- Source Accuracy: {report[\"metrics\"][\"source_accuracy\"][\"average\"]:.4f}')
" >> $GITHUB_STEP_SUMMARY
          else
            echo "No report file found." >> $GITHUB_STEP_SUMMARY
          fi
